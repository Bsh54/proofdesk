<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProofDesk — Live Football</title>
<style>
  /* Design principles: live-first, list is king, red = live, data-first */
  :root {
    --bg: #0e1319; --card: #161d26; --card2: #1c242f; --line: #242e3b;
    --text: #eef2f6; --dim: #8a95a3; --dimmer: #566171;
    --live: #ff4a4a; --green: #2fbd85; --red: #ef5470; --amber: #f2b53d; --blue: #4f9cf7;
    --font: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  header { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 18px; padding: 12px 20px; background: rgba(14,19,25,.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
  .logo { font-weight: 800; font-size: 17px; letter-spacing: .5px; }
  .logo span { color: var(--live); }
  nav .sport { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; background: var(--card2); }
  .conn { margin-left: auto; display: flex; align-items: center; gap: 7px; color: var(--dim); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dimmer); }
  .dot.live { background: var(--live); box-shadow: 0 0 10px var(--live); animation: pulse 1.4s infinite; }
  @keyframes pulse { 50% { opacity: .35; } }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 14px; display: grid; grid-template-columns: 360px minmax(0,1fr); gap: 14px; align-items: start; }
  @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }

  /* ===== LEFT: match list ===== */
  .lfilters { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .chip { padding: 5px 14px; border-radius: 16px; font-size: 12.5px; font-weight: 600; color: var(--dim); background: var(--card2); cursor: pointer; border: 1px solid transparent; }
  .chip.on { color: #fff; background: rgba(255,74,74,.14); border-color: rgba(255,74,74,.45); }
  .leaguehdr { display: flex; gap: 8px; align-items: center; padding: 10px 14px 7px; color: var(--dimmer); font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .mrow { display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; padding: 9px 14px; cursor: pointer; align-items: center; border-top: 1px solid #1a212b; }
  .mrow:hover { background: var(--card2); }
  .mrow.sel { background: rgba(79,156,247,.08); box-shadow: inset 3px 0 0 var(--blue); }
  .mrow .st { font-size: 11px; color: var(--dimmer); text-align: center; font-weight: 700; line-height: 1.35; }
  .mrow .st.live { color: var(--live); font-size: 12px; }
  .mrow .tms { display: flex; flex-direction: column; gap: 4px; font-size: 13.5px; font-weight: 500; min-width: 0; }
  .mrow .tms span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mrow .scs { display: flex; flex-direction: column; gap: 4px; font-size: 13.5px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
  .mrow .scs.live { color: var(--live); }
  .empty { padding: 18px 14px; color: var(--dimmer); font-size: 13px; }
  .oddsmini { display: flex; gap: 4px; }
  .omini { background: var(--card2); border-radius: 5px; padding: 3px 6px; font-size: 11px; font-variant-numeric: tabular-nums; color: var(--dim); min-width: 36px; text-align: center; }

  /* ===== RIGHT: match detail ===== */
  .crumb { color: var(--dimmer); font-size: 12px; padding: 14px 16px 0; }
  .hero { padding: 12px 16px 14px; text-align: center; }
  .teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .team { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--card2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 26px; color: var(--dim); }
  .team .name { font-weight: 600; font-size: 14px; }
  .score { font-size: 44px; font-weight: 800; letter-spacing: 2px; padding: 0 14px; font-variant-numeric: tabular-nums; }
  .phase { color: var(--live); font-size: 13px; font-weight: 700; margin-top: 6px; }
  .phase.done { color: var(--dimmer); }

  .oddsRow { display: flex; gap: 8px; padding: 4px 16px 14px; }
  .pill { flex: 1; background: var(--card2); border: 1px solid var(--line); border-radius: 9px; padding: 8px 6px; text-align: center; transition: .25s; }
  .pill .lbl { font-size: 11px; color: var(--dimmer); }
  .pill .v { font-size: 16px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .pill.down .v { color: var(--green); } .pill.up .v { color: var(--red); }
  .pill.flash { border-color: var(--blue); }

  .tabs { display: flex; border-bottom: 1px solid var(--line); padding: 0 6px; }
  .tab { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--dim); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.on { color: var(--text); border-bottom-color: var(--live); }
  .tabBody { padding: 12px 16px; min-height: 300px; max-height: 520px; overflow-y: auto; }

  .secttl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dimmer); margin: 4px 0 8px; }

  /* momentum */
  #momo { width: 100%; height: 110px; display: block; background: var(--card2); border-radius: 8px; margin-bottom: 12px; }

  /* incidents */
  .tl { display: flex; gap: 12px; padding: 8px 4px; border-bottom: 1px solid #1a212b; align-items: baseline; }
  .tl .m { min-width: 36px; color: var(--live); font-family: var(--mono); font-size: 12px; font-weight: 700; }
  .tl .ico { min-width: 20px; }
  .tl.goal { background: rgba(47,189,133,.05); } .tl.goal .t { color: var(--green); font-weight: 700; }
  .tl.period { background: var(--card2); border-radius: 6px; }
  .tl.period .t { color: var(--dim); font-weight: 700; }
  .tl .t { color: var(--dim); }

  /* stats */
  .pchips { display: flex; gap: 6px; margin-bottom: 14px; }
  .pchip { padding: 4px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; color: var(--dim); background: var(--card2); cursor: pointer; }
  .pchip.on { color: #06251c; background: var(--green); }
  .stat { margin-bottom: 15px; }
  .stat .row { display: grid; grid-template-columns: 48px 1fr 48px; align-items: center; margin-bottom: 5px; }
  .stat .row b { font-size: 14px; font-variant-numeric: tabular-nums; color: var(--dim); }
  .stat .row b.win { color: var(--text); }
  .stat .row b:last-child { text-align: right; }
  .stat .cap { text-align: center; color: var(--dim); font-size: 12.5px; }
  .sbar-wrap { display: flex; gap: 3px; }
  .sbar-wrap .half { flex: 1; background: var(--card2); border-radius: 4px; height: 5px; position: relative; overflow: hidden; }
  .sbar-wrap .half i { position: absolute; top: 0; bottom: 0; border-radius: 4px; }
  .sbar-wrap .half.hl i { right: 0; background: var(--blue); }
  .sbar-wrap .half.hr i { left: 0; background: var(--live); }

  /* odds markets */
  .mkt { margin-bottom: 14px; }
  .mkt .mname { font-size: 12.5px; font-weight: 700; color: var(--dim); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .mkt .mname small { color: var(--dimmer); font-weight: 500; }
  .mchoices { display: flex; gap: 8px; }
  .mc { flex: 1; background: var(--card2); border: 1px solid var(--line); border-radius: 8px; padding: 7px 8px; display: flex; justify-content: space-between; align-items: center; }
  .mc .n { font-size: 12px; color: var(--dimmer); }
  .mc .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .mc .arr { font-size: 11px; margin-left: 4px; }
  .mc .arr.up { color: var(--red); } .mc .arr.dn { color: var(--green); }
  canvas.oddshist { width: 100%; height: 220px; }
</style>
</head>
<body>
<header>
  <div class="logo">Proof<span>Desk</span></div>
  <nav><span class="sport">⚽ Football</span></nav>
  <div class="conn"><span class="dot" id="connDot"></span><span id="connTxt">connecting…</span></div>
</header>

<div class="wrap">
  <aside class="card">
    <div class="lfilters">
      <span class="chip on" id="fAll">All</span>
      <span class="chip" id="fLive">Live <span id="liveCount"></span></span>
    </div>
    <div id="matchList"><div class="empty">Loading fixtures…</div></div>
  </aside>

  <main class="card">
    <div class="crumb" id="crumb">—</div>
    <div class="hero">
      <div class="teams">
        <div class="team"><div class="avatar" id="avHome">–</div><div class="name" id="nmHome">—</div></div>
        <div>
          <div class="score"><span id="scH">0</span> – <span id="scA">0</span></div>
          <div class="phase" id="phase">select a match</div>
        </div>
        <div class="team"><div class="avatar" id="avAway">–</div><div class="name" id="nmAway">—</div></div>
      </div>
    </div>
    <div class="oddsRow">
      <div class="pill" id="p1"><div class="lbl">1</div><div class="v" id="o1">–</div></div>
      <div class="pill" id="pX"><div class="lbl">X</div><div class="v" id="oX">–</div></div>
      <div class="pill" id="p2"><div class="lbl">2</div><div class="v" id="o2">–</div></div>
    </div>
    <div class="tabs">
      <div class="tab on" data-t="details">Details</div>
      <div class="tab" data-t="stats">Statistics</div>
      <div class="tab" data-t="odds">Odds</div>
    </div>
    <div class="tabBody" id="tb-details">
      <div class="secttl">Attack momentum</div>
      <canvas id="momo"></canvas>
      <div class="secttl">Incidents</div>
      <div id="incBox"><div class="empty">Incidents will appear here in real time.</div></div>
    </div>
    <div class="tabBody" id="tb-stats" style="display:none">
      <div class="pchips"><span class="pchip on" data-p="ALL">ALL</span><span class="pchip" data-p="1ST">1ST</span><span class="pchip" data-p="2ND">2ND</span></div>
      <div id="statsBox"><div class="empty">Waiting for statistics…</div></div>
    </div>
    <div class="tabBody" id="tb-odds" style="display:none">
      <div id="mktBox"><div class="empty">Waiting for markets…</div></div>
      <div class="secttl" style="margin-top:14px">1X2 history (this session)</div>
      <canvas id="chart" class="oddshist"></canvas>
    </div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
let ws, oddsSeries = [], eventsCache = [], selectedId = null, filterLive = false;
let statsData = [], statsPeriod = "ALL";

/* national team name -> ISO country code, rendered as CDN flag images
   (emoji flags do not render on Windows — images work everywhere) */
const ISO = { France:"fr", Spain:"es", England:"gb-eng", Argentina:"ar", Brazil:"br", Germany:"de", Portugal:"pt", Netherlands:"nl", Italy:"it", Belgium:"be", Croatia:"hr", Morocco:"ma", Japan:"jp", USA:"us", "United States":"us", Mexico:"mx", Canada:"ca", Uruguay:"uy", Colombia:"co", Senegal:"sn", Ghana:"gh", Nigeria:"ng", Cameroon:"cm", Australia:"au", "South Korea":"kr", "Korea Republic":"kr", Korea:"kr", "Saudi Arabia":"sa", Qatar:"qa", Iran:"ir", Switzerland:"ch", Poland:"pl", Denmark:"dk", Sweden:"se", Norway:"no", Austria:"at", Ukraine:"ua", Serbia:"rs", Turkey:"tr", Türkiye:"tr", Vietnam:"vn", Myanmar:"mm", Ecuador:"ec", Peru:"pe", Chile:"cl", Paraguay:"py", Bolivia:"bo", Venezuela:"ve", Wales:"gb-wls", Scotland:"gb-sct", "Northern Ireland":"gb-nir", Ireland:"ie", "Republic of Ireland":"ie", "Czech Republic":"cz", Czechia:"cz", Slovakia:"sk", Slovenia:"si", Hungary:"hu", Romania:"ro", Bulgaria:"bg", Greece:"gr", Egypt:"eg", Algeria:"dz", Tunisia:"tn", Libya:"ly", "Ivory Coast":"ci", "Cote d'Ivoire":"ci", Mali:"ml", "Burkina Faso":"bf", "South Africa":"za", "DR Congo":"cd", "Congo DR":"cd", Guinea:"gn", "Cape Verde":"cv", Gabon:"ga", Togo:"tg", Benin:"bj", Zambia:"zm", Zimbabwe:"zw", Kenya:"ke", Ethiopia:"et", Sudan:"sd", Angola:"ao", Mozambique:"mz", "Costa Rica":"cr", Panama:"pa", Honduras:"hn", "El Salvador":"sv", Guatemala:"gt", Jamaica:"jm", Haiti:"ht", "Trinidad and Tobago":"tt", "New Zealand":"nz", Fiji:"fj", China:"cn", "China PR":"cn", India:"in", Thailand:"th", Indonesia:"id", Malaysia:"my", Singapore:"sg", Philippines:"ph", Uzbekistan:"uz", Jordan:"jo", Iraq:"iq", Syria:"sy", Lebanon:"lb", Oman:"om", Bahrain:"bh", Kuwait:"kw", UAE:"ae", "United Arab Emirates":"ae", Israel:"il", Palestine:"ps", Russia:"ru", Belarus:"by", Georgia:"ge", Armenia:"am", Azerbaijan:"az", Kazakhstan:"kz", Finland:"fi", Iceland:"is", Estonia:"ee", Latvia:"lv", Lithuania:"lt", Albania:"al", "North Macedonia":"mk", Macedonia:"mk", Kosovo:"xk", Montenegro:"me", "Bosnia and Herzegovina":"ba", Bosnia:"ba", Moldova:"md", Cyprus:"cy", Malta:"mt", Luxembourg:"lu", "Faroe Islands":"fo", Andorra:"ad", "San Marino":"sm", Gibraltar:"gi", Liechtenstein:"li" };
const isoOf = (n) => ISO[n] || ISO[String(n).replace(/ U\d+$/, "")] || null;
const flagImg = (n, size) => { const c = isoOf(n); return c ? '<img src="https://flagcdn.com/w' + size + '/' + c + '.png" alt="" style="border-radius:3px;vertical-align:-2px" width="' + (size / 2) + '">' : ""; };
const initials = (n) => String(n).split(/\s+/).filter(Boolean).map((w) => w[0]).join("").slice(0, 3).toUpperCase();
const teamGlyphHTML = (n) => { const c = isoOf(n); return c ? '<img src="https://flagcdn.com/w80/' + c + '.png" alt="" style="width:40px;border-radius:4px">' : initials(n); };

function connect() {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onopen = () => { $("connDot").className = "dot live"; $("connTxt").textContent = "live"; };
  ws.onclose = () => { $("connDot").className = "dot"; $("connTxt").textContent = "offline"; setTimeout(connect, 2000); };
  ws.onmessage = (m) => handle(JSON.parse(m.data));
}
connect();

function handle(msg) {
  if (msg.kind === "event") renderOddsTick(msg.ev);
  if (msg.kind === "match_state") { renderState(msg.state); loadGraph(selectedId); }
  if (msg.kind === "incident" && msg.fixtureId === selectedId) { prependIncident(msg.incident); }
  if (msg.kind === "live_odds_all") { refreshList(); if (msg.fixtureId === selectedId && isTab("odds")) loadMarkets(selectedId); }
}

/* ===== match list ===== */
async function refreshList() {
  let body;
  try { body = await (await fetch("/api/events/live")).json(); } catch { return; }
  eventsCache = body.events || [];
  const liveN = eventsCache.filter((e) => e.status.type === "inprogress").length;
  $("liveCount").textContent = liveN ? "(" + liveN + ")" : "";
  renderList();
  if (selectedId == null && eventsCache.length) {
    const best = eventsCache.find((e) => e.status.type === "inprogress") || eventsCache[0];
    selectMatch(best.id);
  }
}

function renderList() {
  const list = filterLive ? eventsCache.filter((e) => e.status.type === "inprogress") : eventsCache;
  const el = $("matchList");
  if (!list.length) { el.innerHTML = '<div class="empty">' + (eventsCache.length ? "No live match right now." : "Waiting for fixtures…") + "</div>"; return; }
  const byTournament = {};
  for (const e of list) (byTournament[e.tournament.name] = byTournament[e.tournament.name] || []).push(e);
  el.innerHTML = Object.entries(byTournament).map(([tn, evs]) =>
    '<div class="leaguehdr">🏆 ' + tn + "</div>" + evs.map((e) => {
      const liveM = e.status.type === "inprogress";
      const sel = e.id === selectedId ? " sel" : "";
      const st = liveM ? '<span class="st live">' + (e.time.minute != null ? e.time.minute + "′" : "LIVE") + "</span>"
        : e.status.type === "finished" ? '<span class="st">FT</span>'
        : '<span class="st">' + (e.startTimestamp ? new Date(e.startTimestamp * 1000).toLocaleDateString([], { day: "2-digit", month: "2-digit" }) + "<br>" + new Date(e.startTimestamp * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "—") + "</span>";
      const fh = flagImg(e.homeTeam.name, 20), fa = flagImg(e.awayTeam.name, 20);
      const right = (e.status.type === "notstarted" && e.odds)
        ? '<span class="oddsmini"><span class="omini">' + e.odds.home.toFixed(2) + '</span><span class="omini">' + e.odds.draw.toFixed(2) + '</span><span class="omini">' + e.odds.away.toFixed(2) + "</span></span>"
        : '<span class="scs' + (liveM ? " live" : "") + '"><span>' + e.homeScore.display + "</span><span>" + e.awayScore.display + "</span></span>";
      return '<div class="mrow' + sel + '" data-id="' + e.id + '">' + st +
        '<span class="tms"><span>' + (fh ? fh + " " : "") + e.homeTeam.name + "</span><span>" + (fa ? fa + " " : "") + e.awayTeam.name + "</span></span>" + right + "</div>";
    }).join("")
  ).join("");
  el.querySelectorAll(".mrow").forEach((r) => r.onclick = () => selectMatch(+r.dataset.id));
}

async function selectMatch(id) {
  selectedId = id;
  renderList();
  const e = eventsCache.find((x) => x.id === id);
  if (e) {
    $("crumb").textContent = e.tournament.name + (e.startTimestamp ? " · " + new Date(e.startTimestamp * 1000).toLocaleString([], { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }) : "");
    $("nmHome").textContent = e.homeTeam.name; $("nmAway").textContent = e.awayTeam.name;
    $("avHome").innerHTML = teamGlyphHTML(e.homeTeam.name); $("avAway").innerHTML = teamGlyphHTML(e.awayTeam.name);
    $("scH").textContent = e.homeScore.display; $("scA").textContent = e.awayScore.display;
    setPhase(e);
    if (e.odds) { $("o1").textContent = e.odds.home.toFixed(2); $("oX").textContent = e.odds.draw.toFixed(2); $("o2").textContent = e.odds.away.toFixed(2); }
    else { $("o1").textContent = $("oX").textContent = $("o2").textContent = "–"; }
  }
  oddsSeries = [];
  await fetch("/api/live/watch", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ fixtureId: id }) });
  loadIncidents(id); loadGraph(id); loadStats(id); loadMarkets(id);
}

function setPhase(e) {
  const ph = $("phase");
  if (e.status.type === "inprogress") { ph.className = "phase"; ph.textContent = (e.status.description || "Live") + (e.time.minute != null ? " · " + e.time.minute + "′" : ""); }
  else { ph.className = "phase done"; ph.textContent = e.status.description || "—"; }
}

$("fAll").onclick = () => { filterLive = false; $("fAll").classList.add("on"); $("fLive").classList.remove("on"); renderList(); };
$("fLive").onclick = () => { filterLive = true; $("fLive").classList.add("on"); $("fAll").classList.remove("on"); renderList(); };

/* ===== hero live updates ===== */
function renderState(st) {
  $("scH").textContent = st.score[0]; $("scA").textContent = st.score[1];
  if (st.minute != null) $("phase").textContent = (st.gameState && st.gameState !== "—" ? st.gameState + " · " : "") + st.minute + "′";
  if (isTab("stats")) renderStatsUI();
}

/* ===== incidents ===== */
async function loadIncidents(id) {
  let body; try { body = await (await fetch("/api/events/" + id + "/incidents")).json(); } catch { return; }
  const f = $("incBox"); f.innerHTML = "";
  const incs = body.incidents || [];
  if (!incs.length) { f.innerHTML = '<div class="empty">No incidents yet — goals, cards and periods appear here live.</div>'; return; }
  incs.forEach((inc) => prependIncident(inc));
}

function prependIncident(inc) {
  const f = $("incBox");
  if (f.querySelector(".empty")) f.innerHTML = "";
  const side = inc.isHome === undefined ? "" : inc.isHome ? $("nmHome").textContent : $("nmAway").textContent;
  let ico = "•", cls = "", txt = "";
  if (inc.incidentType === "goal") { ico = "⚽"; cls = "goal"; txt = "Goal — " + side + "  " + inc.homeScore + " - " + inc.awayScore; }
  else if (inc.incidentType === "card") { ico = inc.cardColor === "red" ? "🟥" : "🟨"; txt = (inc.cardColor === "red" ? "Red" : "Yellow") + " card — " + side; }
  else if (inc.incidentType === "varDecision") { ico = "📺"; txt = (inc.text || "VAR decision") + "  " + inc.homeScore + " - " + inc.awayScore; }
  else if (inc.incidentType === "period") { ico = "⏱"; cls = "period"; txt = inc.text + (inc.homeScore != null ? "  " + inc.homeScore + " - " + inc.awayScore : ""); }
  else return;
  const d = document.createElement("div");
  d.className = "tl " + cls;
  d.innerHTML = '<span class="m">' + (inc.time != null ? inc.time + "′" : "—") + '</span><span class="ico">' + ico + '</span><span class="t">' + txt + "</span>";
  f.prepend(d);
  while (f.children.length > 90) f.lastChild.remove();
}

/* ===== attack momentum ===== */
const momo = $("momo"), mctx = momo.getContext("2d");
let graphPoints = [];
async function loadGraph(id) {
  if (!id) return;
  try { graphPoints = (await (await fetch("/api/events/" + id + "/graph")).json()).graphPoints || []; } catch { return; }
  drawMomentum();
}
function drawMomentum() {
  const w = momo.width = momo.clientWidth, h = momo.height = 110;
  mctx.clearRect(0, 0, w, h);
  const mid = h / 2;
  mctx.strokeStyle = "#242e3b"; mctx.beginPath(); mctx.moveTo(0, mid); mctx.lineTo(w, mid); mctx.stroke();
  if (!graphPoints.length) {
    mctx.fillStyle = "#566171"; mctx.font = "11px sans-serif"; mctx.fillText("waiting for match activity…", 10, mid - 6);
    return;
  }
  const maxMin = Math.max(90, graphPoints[graphPoints.length - 1].minute + 1);
  const bw = Math.max(2, (w / maxMin) - 1);
  for (const p of graphPoints) {
    const x = (p.minute / maxMin) * (w - bw);
    const bh = (Math.abs(p.value) / 100) * (mid - 4);
    mctx.fillStyle = p.value >= 0 ? "#4f9cf7" : "#ff4a4a";
    if (p.value >= 0) mctx.fillRect(x, mid - bh, bw, bh); else mctx.fillRect(x, mid, bw, bh);
  }
  // halftime marker
  const hx = (45 / maxMin) * w;
  mctx.strokeStyle = "#566171"; mctx.setLineDash([3, 3]); mctx.beginPath(); mctx.moveTo(hx, 4); mctx.lineTo(hx, h - 4); mctx.stroke(); mctx.setLineDash([]);
}

/* ===== statistics (periods ALL/1ST/2ND) ===== */
async function loadStats(id) {
  if (!id) return;
  try { statsData = (await (await fetch("/api/events/" + id + "/statistics")).json()).statistics || []; } catch { return; }
  renderStatsUI();
}
function renderStatsUI() {
  const per = statsData.find((s) => s.period === statsPeriod) || statsData[0];
  const box = $("statsBox");
  if (!per) { box.innerHTML = '<div class="empty">Waiting for statistics…</div>'; return; }
  box.innerHTML = per.groups.map((g) =>
    '<div class="secttl">' + g.groupName + "</div>" + g.statisticsItems.map((it) => {
      const l = it.homeValue, r = it.awayValue, tot = (l + r) || 1;
      return '<div class="stat"><div class="row"><b class="' + (it.compareCode === 1 ? "win" : "") + '">' + it.home + '</b><span class="cap">' + it.name + '</span><b class="' + (it.compareCode === 2 ? "win" : "") + '">' + it.away + "</b></div>" +
        '<div class="sbar-wrap"><div class="half hl"><i style="width:' + (l / tot * 100) + '%"></i></div><div class="half hr"><i style="width:' + (r / tot * 100) + '%"></i></div></div></div>';
    }).join("")
  ).join("");
}
document.querySelectorAll(".pchip").forEach((c) => c.onclick = () => {
  document.querySelectorAll(".pchip").forEach((x) => x.classList.remove("on"));
  c.classList.add("on"); statsPeriod = c.dataset.p; renderStatsUI();
});

/* ===== odds markets ===== */
async function loadMarkets(id) {
  if (!id) return;
  let body; try { body = await (await fetch("/api/events/" + id + "/odds")).json(); } catch { return; }
  const mkts = body.markets || [];
  const box = $("mktBox");
  if (!mkts.length) { box.innerHTML = '<div class="empty">No markets for this match yet.</div>'; return; }
  const shown = mkts.filter((m) => m.marketName === "Full time result")
    .concat(mkts.filter((m) => m.marketName === "Total goals").slice(0, 6))
    .concat(mkts.filter((m) => m.marketName === "Asian handicap").slice(0, 4));
  box.innerHTML = shown.map((m) =>
    '<div class="mkt"><div class="mname">' + m.marketName + (m.marketParams ? ' <small>' + m.marketParams.replace("line=", "line ") + "</small>" : "") + "</div><div class=\"mchoices\">" +
    m.choices.map((c) => '<div class="mc"><span class="n">' + c.name + '</span><span class="v">' + c.value + (c.change ? '<span class="arr ' + (c.change > 0 ? "up" : "dn") + '">' + (c.change > 0 ? "▲" : "▼") + "</span>" : "") + "</span></div>").join("") +
    "</div></div>"
  ).join("");
}

/* ===== 1X2 pills + history ===== */
function renderOddsTick(ev) {
  if (ev.type !== "odds") return;
  for (const [k, id, pid] of [["home","o1","p1"],["draw","oX","pX"],["away","o2","p2"]]) {
    const el = $(id), prev = parseFloat(el.textContent);
    el.textContent = ev[k].toFixed(2);
    const p = $(pid); p.classList.remove("up","down","flash");
    if (!isNaN(prev) && ev[k] !== prev) { p.classList.add(ev[k] > prev ? "up" : "down", "flash"); setTimeout(() => p.classList.remove("flash"), 500); }
  }
  oddsSeries.push(ev); drawChart();
}

const canvas = $("chart"), ctx = canvas.getContext("2d");
function drawChart() {
  if (!isTab("odds")) return;
  const w = canvas.width = canvas.clientWidth, h = canvas.height = 220;
  ctx.clearRect(0, 0, w, h);
  if (oddsSeries.length < 2) { ctx.fillStyle = "#566171"; ctx.font = "11px sans-serif"; ctx.fillText("odds history builds while you watch…", 10, 20); return; }
  const all = oddsSeries.flatMap((o) => [o.home, o.away, o.draw]);
  const min = Math.min(...all) * .95, max = Math.max(...all) * 1.05;
  const x = (i) => (i / (oddsSeries.length - 1)) * (w - 50) + 40;
  const y = (v) => h - 20 - ((v - min) / (max - min)) * (h - 40);
  ctx.strokeStyle = "#242e3b"; ctx.beginPath();
  for (let g = 0; g <= 4; g++) { const gy = 10 + g * (h - 30) / 4; ctx.moveTo(40, gy); ctx.lineTo(w - 10, gy); }
  ctx.stroke();
  for (const [k, c] of [["home", "#4f9cf7"], ["draw", "#f2b53d"], ["away", "#ff4a4a"]]) {
    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.beginPath();
    oddsSeries.forEach((o, i) => i ? ctx.lineTo(x(i), y(o[k])) : ctx.moveTo(x(i), y(o[k])));
    ctx.stroke();
  }
  ctx.fillStyle = "#566171"; ctx.font = "10px monospace";
  ctx.fillText(max.toFixed(1), 8, 16); ctx.fillText(min.toFixed(1), 8, h - 14);
}

/* tabs */
function isTab(t) { return document.querySelector(".tab.on")?.dataset.t === t; }
document.querySelectorAll(".tab").forEach((t) => t.onclick = () => {
  document.querySelectorAll(".tab").forEach((x) => x.classList.remove("on"));
  t.classList.add("on");
  for (const b of ["details", "stats", "odds"]) $("tb-" + b).style.display = b === t.dataset.t ? "" : "none";
  if (t.dataset.t === "odds") { loadMarkets(selectedId); drawChart(); }
  if (t.dataset.t === "stats") loadStats(selectedId);
  if (t.dataset.t === "details") { loadGraph(selectedId); }
});

/* LIVE BY DEFAULT */
(async function boot() {
  try { await fetch("/api/live/connect", { method: "POST" }); } catch {}
  await refreshList();
  setInterval(refreshList, 5000);
  setInterval(() => { if (selectedId && isTab("details")) { loadGraph(selectedId); } }, 15000);
  setInterval(() => { if (selectedId && isTab("odds")) loadMarkets(selectedId); }, 10000);
  setInterval(() => { if (selectedId && isTab("stats")) loadStats(selectedId); }, 15000);
})();
</script>
