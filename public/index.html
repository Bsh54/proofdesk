<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProofDesk — Verifiable Sports Trading Terminal</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #11161f; --border: #1e2633; --text: #c9d4e3;
    --dim: #5c6b80; --green: #2dd4a7; --red: #f4587a; --amber: #f5b74e;
    --blue: #4e9cf5; --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 16px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header .logo { font-weight: 700; font-size: 15px; color: #fff; letter-spacing: 1px; }
  header .logo span { color: var(--green); }
  header .match { color: var(--amber); font-weight: 600; }
  header .status { margin-left: auto; display: flex; gap: 14px; align-items: center; color: var(--dim); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 5px; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  main { flex: 1; display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto 1fr; gap: 10px; padding: 10px; min-height: 0; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
  .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .panel .body { flex: 1; overflow-y: auto; padding: 10px 14px; }

  /* odds board */
  #oddsBoard { grid-column: 1; display: flex; gap: 10px; padding: 14px; align-items: stretch; }
  .oddCard { flex: 1; background: #0d1320; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; transition: border-color .3s; }
  .oddCard .team { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .oddCard .val { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .oddCard.up .val { color: var(--red); } .oddCard.down .val { color: var(--green); }
  .flash { animation: flash .6s; } @keyframes flash { 0% { background: #1a2740; } }

  #chartPanel { grid-column: 1; grid-row: 2; }
  canvas { width: 100%; height: 100%; }

  aside { grid-column: 2; grid-row: 1 / span 2; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  aside .panel { flex: 1; }

  .ev { padding: 4px 0; border-bottom: 1px dashed #182030; display: flex; gap: 8px; }
  .ev .min { color: var(--dim); min-width: 32px; }
  .ev.goal { color: var(--green); font-weight: 700; }
  .ev.card-red { color: var(--red); font-weight: 700; }
  .ev.var { color: var(--amber); }

  .pos { padding: 6px 8px; margin-bottom: 6px; background: #0d1320; border-left: 3px solid var(--blue); border-radius: 4px; }
  .pos .pnl.win { color: var(--green); } .pos .pnl.loss { color: var(--red); }
  .pos small { color: var(--dim); display: block; }

  .jentry { padding: 6px 8px; margin-bottom: 6px; background: #0d1320; border-left: 3px solid var(--green); border-radius: 4px; font-size: 11px; }
  .jentry .hash { color: var(--blue); word-break: break-all; }
  .jentry small { color: var(--dim); }

  footer { display: flex; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--panel); align-items: center; }
  button { background: var(--green); color: #06251c; border: 0; padding: 8px 18px; border-radius: 6px; font-family: var(--mono); font-weight: 700; cursor: pointer; font-size: 13px; }
  button:hover { filter: brightness(1.15); }
  button.secondary { background: #223045; color: var(--text); }
  select, input { background: #0d1320; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-family: var(--mono); }
  #bankroll { margin-left: auto; font-size: 16px; font-weight: 700; }
  #verifyState { color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<header>
  <div class="logo">PROOF<span>DESK</span></div>
  <div class="match" id="matchName">— no session —</div>
  <div class="status">
    <span><span class="dot" id="connDot"></span><span id="connTxt">connecting…</span></span>
    <span id="clock">00'</span>
  </div>
</header>

<main>
  <div class="panel" id="oddsPanel" style="grid-row:1">
    <div id="oddsBoard">
      <div class="oddCard" id="cardHome"><div class="team" id="tHome">HOME</div><div class="val" id="oHome">–</div></div>
      <div class="oddCard" id="cardDraw"><div class="team">DRAW</div><div class="val" id="oDraw">–</div></div>
      <div class="oddCard" id="cardAway"><div class="team" id="tAway">AWAY</div><div class="val" id="oAway">–</div></div>
    </div>
  </div>

  <div class="panel" id="chartPanel">
    <h2>Odds evolution</h2>
    <div class="body" style="padding:0"><canvas id="chart"></canvas></div>
  </div>

  <aside>
    <div class="panel">
      <h2>Match feed</h2>
      <div class="body" id="feed"></div>
    </div>
    <div class="panel">
      <h2>Agent positions</h2>
      <div class="body" id="positions"></div>
    </div>
    <div class="panel">
      <h2>🧾 Proof journal (hash-chained)</h2>
      <div class="body" id="journal"></div>
    </div>
  </aside>
</main>

<footer>
  <label>Seed <input id="seed" type="number" value="42" style="width:70px"></label>
  <label>Speed <select id="speed"><option value="10">x10</option><option value="20" selected>x20</option><option value="60">x60</option></select></label>
  <button id="btnStart">▶ REPLAY MATCH</button>
  <button class="secondary" id="btnVerify">VERIFY CHAIN</button>
  <span id="verifyState"></span>
  <div id="bankroll">$1000.00</div>
</footer>

<script>
const $ = (id) => document.getElementById(id);
let ws, oddsSeries = [], lastOdds = null, homeName = "HOME", awayName = "AWAY";

function connect() {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onopen = () => { $("connDot").className = "dot live"; $("connTxt").textContent = "live"; };
  ws.onclose = () => { $("connDot").className = "dot"; $("connTxt").textContent = "offline"; setTimeout(connect, 2000); };
  ws.onmessage = (m) => handle(JSON.parse(m.data));
}
connect();

function handle(msg) {
  if (msg.kind === "hello") { (msg.journal || []).slice(-12).forEach(renderJournal); }
  if (msg.kind === "session") {
    homeName = msg.match.home; awayName = msg.match.away;
    $("matchName").textContent = homeName + "  vs  " + awayName + "  (seed " + msg.match.seed + ")";
    $("tHome").textContent = homeName.toUpperCase(); $("tAway").textContent = awayName.toUpperCase();
    $("feed").innerHTML = ""; $("positions").innerHTML = ""; oddsSeries = []; lastOdds = null;
  }
  if (msg.kind === "event") renderEvent(msg.ev);
  if (msg.kind === "journal") renderJournal(msg.entry);
  if (msg.kind === "agent") renderAgent(msg.agent);
  if (msg.kind === "session_end") addFeed("FT", "— FULL TIME — session settled", "goal");
}

function renderEvent(ev) {
  $("clock").textContent = ev.minute + "'";
  if (ev.type === "odds") {
    for (const [side, id, card] of [["home","oHome","cardHome"],["draw","oDraw","cardDraw"],["away","oAway","cardAway"]]) {
      const el = $(id); const prev = parseFloat(el.textContent);
      el.textContent = ev[side].toFixed(2);
      const c = $(card); c.classList.remove("up","down","flash");
      if (!isNaN(prev) && ev[side] !== prev) { c.classList.add(ev[side] > prev ? "up" : "down", "flash"); }
    }
    oddsSeries.push(ev); lastOdds = ev; drawChart();
  }
  else if (ev.type === "goal") addFeed(ev.minute + "'", "⚽ GOAL — " + ev.team + "  [" + ev.score + "]", "goal");
  else if (ev.type === "card") addFeed(ev.minute + "'", (ev.card === "red" ? "🟥" : "🟨") + " " + ev.card.toUpperCase() + " card — " + ev.team, ev.card === "red" ? "card-red" : "");
  else if (ev.type === "var") addFeed(ev.minute + "'", "📺 VAR review: " + ev.review, "var");
  else if (ev.type === "var_end") addFeed(ev.minute + "'", "📺 VAR: " + ev.outcome + (ev.score ? "  [" + ev.score + "]" : ""), "var");
  else if (ev.type === "corner") addFeed(ev.minute + "'", "◤ corner — " + ev.team, "");
  else if (ev.type === "shot") addFeed(ev.minute + "'", "◎ shot " + ev.outcome + " — " + ev.team, "");
  else if (ev.type === "full_time") addFeed("90'", "FULL TIME " + ev.score + " — winner: " + ev.winner, "goal");
}

function addFeed(min, txt, cls) {
  const d = document.createElement("div");
  d.className = "ev " + cls;
  d.innerHTML = '<span class="min">' + min + "</span><span>" + txt + "</span>";
  const f = $("feed"); f.prepend(d);
  while (f.children.length > 60) f.lastChild.remove();
}

function renderAgent(agent) {
  $("bankroll").textContent = "$" + agent.bankroll.toFixed(2);
  $("bankroll").style.color = agent.bankroll >= 1000 ? "var(--green)" : "var(--red)";
  const p = $("positions"); p.innerHTML = "";
  for (const pos of [...agent.open].reverse()) {
    p.insertAdjacentHTML("beforeend", '<div class="pos"><b>' + pos.team + "</b> @ " + pos.odds + " · $" + pos.stake +
      ' <span style="color:var(--amber)">OPEN</span><small>' + pos.rule + " · " + pos.minute + "' · " + pos.trigger + "</small></div>");
  }
  for (const pos of [...agent.closed].reverse()) {
    p.insertAdjacentHTML("beforeend", '<div class="pos"><b>' + pos.team + "</b> @ " + pos.odds + " · $" + pos.stake +
      ' <span class="pnl ' + (pos.won ? "win" : "loss") + '">' + (pos.pnl >= 0 ? "+" : "") + pos.pnl.toFixed(2) + "</span><small>" +
      pos.rule + " · settled " + pos.finalScore + "</small></div>");
  }
}

function renderJournal(e) {
  const j = $("journal");
  const label = e.kind === "decision" ? (e.action + " " + (e.position?.team || "") + " @" + (e.position?.odds ?? "")) : e.kind;
  j.insertAdjacentHTML("afterbegin", '<div class="jentry"><b>' + label + "</b><br><small>" + e.ts + "</small><br>" +
    '<span class="hash">#' + e.hash.slice(0, 20) + "…</span> <small>← prev #" + String(e.prevHash).slice(0, 12) + "…</small></div>");
  while (j.children.length > 30) j.lastChild.remove();
}

// --- chart ---
const canvas = $("chart"), ctx = canvas.getContext("2d");
function drawChart() {
  const w = canvas.width = canvas.clientWidth, h = canvas.height = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  if (oddsSeries.length < 2) return;
  const all = oddsSeries.flatMap((o) => [o.home, o.away, o.draw]);
  const min = Math.min(...all) * 0.95, max = Math.max(...all) * 1.05;
  const x = (i) => (i / (oddsSeries.length - 1)) * (w - 50) + 40;
  const y = (v) => h - 20 - ((v - min) / (max - min)) * (h - 40);
  ctx.strokeStyle = "#1e2633"; ctx.beginPath();
  for (let g = 0; g <= 4; g++) { const gy = 10 + (g * (h - 30)) / 4; ctx.moveTo(40, gy); ctx.lineTo(w - 10, gy); }
  ctx.stroke();
  const series = [["home", "#2dd4a7"], ["draw", "#f5b74e"], ["away", "#f4587a"]];
  for (const [key, color] of series) {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    oddsSeries.forEach((o, i) => i ? ctx.lineTo(x(i), y(o[key])) : ctx.moveTo(x(i), y(o[key])));
    ctx.stroke();
  }
  ctx.fillStyle = "#5c6b80"; ctx.font = "10px monospace";
  ctx.fillText(max.toFixed(1), 8, 16); ctx.fillText(min.toFixed(1), 8, h - 16);
}

$("btnStart").onclick = () =>
  fetch("/api/replay/start", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ seed: +$("seed").value, speed: +$("speed").value }) });

$("btnVerify").onclick = async () => {
  const r = await (await fetch("/api/journal/verify")).json();
  $("verifyState").textContent = r.ok ? "✔ chain intact — " + r.count + " entries — head #" + r.head.slice(0, 12) + "…" : "✘ BROKEN at " + r.brokenAt;
  $("verifyState").style.color = r.ok ? "var(--green)" : "var(--red)";
};
</script>
</body>
</html>
